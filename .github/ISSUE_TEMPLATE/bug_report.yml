name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Paste screenshots, stack traces, or console output.

  - type: input
    id: version
    attributes:
      label: App or commit version
      placeholder: e.g. main@abcdef

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - local development
        - production build
        - other
    validations:
      required: true
